            --
            ### Problemy tradycyjnej architektury

            - Każda interakcja = pełne przeładowanie strony — migotanie ekranu, opóźnienie
            - Redundantne przesyłanie HTML przy każdym żądaniu (nagłówek, menu, stopka)
            - Duże obciążenie serwera — renderowanie widoków po stronie serwera
            - Trudna implementacja bogatego UI (walidacja na żywo, drag&drop, animacje)
            - Ścisłe powiązanie frontendu z backendem — każda zmiana wpływa na obie warstwy
            --
            ### Single-Page Application

            - Aplikacja pobierana **jednorazowo** (HTML + CSS + JS bundle)
            - Nawigacja obsługiwana przez JavaScript — **bez przeładowania strony**
            - Backend dostarcza tylko **dane** (JSON przez REST API lub GraphQL)
            - Przeglądarka renderuje widoki dynamicznie — natychmiastowa reakcja na akcje

            ### Model DOM
            --
            DOM (*Document Object Model*) jest to model obiektowy reprezentujący dokument HTML wyświetlany przez przeglądarkę.

            Przeglądarka buduje DOM w pamięci za każdym razem, gdy wyświetla HTML.

            Każdy skrypt JavaScript (a więc także i każda aplikacja Angular) wchodzi w interakcję z DOM.
            --

            ### Dyrektywy

            *Dyrektywy* to elementy rozszerzające funkcjonalność HTML, które można deklarować za pomocą Angular.

            <div>
              <p>Istnieją trzy rodzaje dyrektyw:</p>

              </ul>

            --
            ### Dyrektywy atrybutowe

            - `ngModel` - wiążą pola edycyjne z modelem
            - `ngClass` - pozwalają dynamicznie modyfikować klasy CSS
            - `ngStyle` - pozwalają dynamicznie modyfikować style CSS
            --
            ### Dyrektywy atrybutowe

            ```typescript
            divClasses = {};
            ...
            this.divClasses: {
              'valid': this.isValid(),
              'highlighted': this.isHighlighted()
            }
            ```

            ```html
            <div [ngClass]='divClasses'>...</div>
            ```

            W prostszych przypadkach...

            ```html
            <div [class.valid]='isValid()'>...</div>
            ```
            --
            ### Dyrektywy strukturalne

            `*ngIf` - dodaje/usuwa element z DOM:<!-- .element class="align-left"-->

            ```html
            <div *ngIf='isVisible'>...</div>
            ```

            `*ngFor` - iteruje po liście i dodaje element DOM dla każdego elementu listy:<!-- .element class="align-left"-->

            ```html
            <div *ngFor='let user of users'>{{user.name}} ({{user.email}})</div>
            ```
            `ngSwitch, *ngSwitchCase, *ngSwitchDefault` - odpowiednik instrukcji switch/case/default z innych języków programowania.<!-- .element class="align-left"-->
            --
            ### Wbudowany control flow (Angular 17+)

            Nowa składnia `@if`, `@for`, `@switch` zastępuje dyrektywy strukturalne — jest częścią szablonu, nie wymaga importu.

            ```html
            @if (isVisible) {
              <div>Widoczne!</div>
            } @else {
              <div>Ukryte</div>
            }
            ```

            ```html
            @for (user of users; track user.id) {
              <div>{{user.name}} ({{user.email}})</div>
            } @empty {
              <div>Brak użytkowników</div>
            }
            ```
            --
            ### Wbudowany control flow — `@switch`

            ```html
            @switch (role) {
              @case ('admin') {
                <p>Administrator</p>
              }
              @case ('user') {
                <p>Użytkownik</p>
              }
              @default {
                <p>Nieznana rola</p>
              }
            }
            ```

            ### Filtry (`Pipes`)
            --
            *Pipe* transformuje wartość wyświetlaną w szablonie.

            ```html
            <p>{{ today | date:'dd.MM.yyyy' }}</p>
            <p>{{ price | currency:'PLN' }}</p>
            <p>{{ name | uppercase }}</p>
            ```

            Pipes można łączyć w łańcuch: `{{ value | pipe1 | pipe2 }}`
            --
            ### Wbudowane pipes

            <table>
              <tr><td><code>date</code></td><td>formatowanie daty i czasu</td></tr>
              <tr><td><code>currency</code></td><td>formatowanie waluty</td></tr>
              <tr><td><code>number</code></td><td>formatowanie liczb (miejsca dziesiętne)</td></tr>
              <tr><td><code>uppercase</code> / <code>lowercase</code></td><td>zmiana wielkości liter</td></tr>
              <tr><td><code>json</code></td><td>serializacja do JSON (do debugowania)</td></tr>
              <tr><td><code>async</code></td><td>subskrypcja Observable lub Promise</td></tr>
            </table>
            --
            ### `AsyncPipe`

            Pipe `async` automatycznie subskrybuje Observable i anuluje subskrypcję przy niszczeniu komponentu.

            ```typescript
            // komponent
            users$ = this.userService.getAllUsers();
            ```

            ```html
           <!-- szablon -->
            <tr *ngFor="let user of users$ | async">
              <td>{{ user.name }}</td>
            </tr>
            ```

            Brak ręcznego `subscribe()` i `unsubscribe()` — eliminuje wycieki pamięci.
            ---
            ### Komunikacja międzykomponentowa
            --
            Angular pozwala na stosowanie *data bindings* we własnych komponentach.

            Dla danych wejściowych:

            ```html
            <app-user-details [user]='user'></app-user-details>
            ```

            ```typescript
            export class UserDetailsComponent
            {
               ...
               @Input() user: User;
               ...
            }
            ```
            --
            Dla danych wyjściowych:

            ```html
            <app-user-details (onChanged)='onChanged($event)'></app-user-details>
            ```

            ```typescript
            export class UserDetailsComponent
            {
               ...
               @Output() onChanged = new EventEmitter<User>();
               ...
               this.onChanged.emit(user);
               ...
            }
            ```

            ### Signals (Angular 16+)
            --
            *Signals* to nowy prymityw reaktywny wprowadzający precyzyjną, opartą na grafie zależności detekcję zmian — krok ku odejściu od `Zone.js`.

            - `signal(value)` — reaktywna wartość powiadamiająca o zmianie
            - `computed(() => ...)` — wartość wyliczana automatycznie z innych sygnałów
            - `effect(() => ...)` — efekt uboczny reagujący na zmiany sygnałów
            --
            <div style="font-size: 0.75em;">

            ```typescript [|2-3|5|7-9]
            export class CounterComponent {
              count   = signal(0);
              doubled = computed(() => this.count() * 2);

              increment() { this.count.update(v => v + 1); }

              constructor() {
                effect(() => console.log('count:', this.count()));
              }
            }
            ```

            ```html
            <p>Licznik: {{ count() }}</p>
            <p>Podwójny: {{ doubled() }}</p>
            <button (click)="increment()">+1</button>
            ```

            </div>

            <p>Signals to nie wynalazek Angular — Vue 3 i Solid.js stosują je od lat.
              Kluczowa różnica: React re-renderuje <em>cały</em> komponent przy każdej zmianie stanu; frameworki sygnałowe aktualizują tylko zależne fragmenty DOM.</p>

            ### Signal-based inputs / outputs (Angular 17+)

            ```typescript [|2-3|5]
            export class UserCardComponent {
              user  = input.required<User>();      // zamiast @Input({required: true})
              label = input('', {alias: 'title'});  // alias i wartość domyślna

              changed = output<User>();             // zamiast @Output() + EventEmitter
            }
            ```

            Pełna integracja z `computed()` — reaktywność bez dekoratorów.

            ### Formularze
            --
            <table>
              <thead>
                <tr><th></th><th>Template-driven</th><th>Reactive</th></tr>
              </thead>
              <tbody>
                <tr><td>Definicja struktury</td><td>Szablon HTML</td><td>Kod TypeScript</td></tr>
                <tr><td>Testowanie</td><td>Wymaga DOM</td><td>Łatwe (czyste TS)</td></tr>
                <tr><td>Walidacja</td><td>Dyrektywy HTML</td><td>Funkcje <code>Validators</code></td></tr>
                <tr><td>Dynamiczne pola</td><td>Trudne</td><td>Naturalne</td></tr>
              </tbody>

            Preferuj **Reactive Forms** dla złożonych i&nbsp;testowalnych formularzy.
            --
            ### Reactive Forms — kod

            ```typescript [|2|4-8|10-13]
            export class UserFormComponent {
              private fb = inject(FormBuilder);

              form = this.fb.group({
                name:  ['', [Validators.required, Validators.minLength(3)]],
                email: ['', [Validators.required, Validators.email]],
                age:   [null, Validators.min(0)]
              });

              onSubmit() {
                if (this.form.valid) {
                  this.userService.saveUser(this.form.value as User);
                }
              }
            }
            ```
            --
            ### Reactive Forms — szablon

            ```html
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <input formControlName="name" placeholder="Imię i nazwisko">
              <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
                Pole wymagane (min. 3 znaki)
              </div>
              <input formControlName="email" type="email" placeholder="Email">
              <button type="submit" [disabled]="form.invalid">Zapisz</button>
            </form>
            ```
            --
            ### Signal Forms (Angular 21+, eksperymentalne)

            Nowy model formularzy zbudowany na sygnałach — stan, walidacja i UI w jednym reaktywnym grafie.

            - `form(model)` — tworzy formularz z dowolnego sygnału
            - walidatory to zwykłe funkcje sygnałowe  
            - pola formularza dziedziczą reaktywność — `computed()` „za darmo"
            - łatwe formularze dynamiczne i zagnieżdżone (`form.users[i].name`)
            --
            ### Signal Forms — przykład

            <div style="font-size: 0.75em;">

            ```typescript
            import { form, required, minLength, email } from '@angular/forms/signals';

            export class UserFormComponent {
              model = signal({ name: '', email: '', age: null });

              userForm = form(this.model, (path) => {
                required(path.name);
                minLength(path.name, 3);
                required(path.email);
                email(path.email);
              });

              onSubmit() {
                if (this.userForm().valid()) {
                  this.userService.saveUser(this.model());
                }
              }
            }
            ```

            ```html
            <input [control]="userForm.name">
            <input [control]="userForm.email" type="email">
            <button [disabled]="!userForm().valid()">Zapisz</button>
            ```

            </div>

            ### Serwis
            --
            Serwis to współdzielony kod aplikacji:

            - może posiadać stan
            - posiada zasięg (*scope*) oraz cykl życia
            - podlega mechanizmowi DI (*dependency injection*)
            --
            ```typescript [|4|6-12|14-16|18-25|27-29|31-35]
            @Injectable()
            export class UserService {

              users: User[] = [];

              constructor() {
                this.users = [
                  {id: 1, name: 'John Doe', email: 'john.doe@email.com'},
                  {id: 2, name: 'Max Rockatansky', email: 'mad.max@email.com'},
                  {id: 3, name: 'Chuck Peddle', email: 'chuck@mos.com'}
                ];
              }

              getAllUsers() {
                return this.users;
              }

              saveUser(user: User) {
                const found = this.findUser(user.id);
                if (found) {
                  Object.assign(found, user);
                } else {
                  this.users.push(user);
                }
              }

              findUser(id: number) {
                return this.users.find((user: User) => user.id === id);
              }

              getNextId() {
                return this.users
                  .map((elem: User) => elem.id)
                  .reduce((prev, curr) => prev > curr ? prev : curr, 0) + 1;
              }
            }
            ```
            ---
            ### RxJS i Observable
            --
            `HttpClient` (i wiele innych części Angulara) zwraca **Observable** z biblioteki **RxJS**.

            - `Observable` — strumień danych (zero lub więcej wartości w czasie)
            - Observable jest *leniwy* — nic się nie dzieje bez `subscribe()`
            - `Subscription` — aktywna subskrypcja; należy ją anulować (`unsubscribe()`), aby uniknąć wycieków pamięci
            - Operatory (`map`, `filter`, `switchMap`…) transformują strumień
            --
            ```typescript [|1|3-7|9-11]
            const users$ = this.userService.getAllUsers(); // Observable — nic się nie dzieje

            const sub = users$.subscribe({
              next:     users => this.users = users,
              error:    err   => console.error(err),
              complete: ()    => console.log('done')
            });

            ngOnDestroy() {
              sub.unsubscribe(); // obowiązkowe!
            }
            ```

            Preferuj `AsyncPipe` w szablonie — zarządza subskrypcją automatycznie.
            --
            ### Popularne operatory RxJS

            <table>
              <tr><td><code>map</code></td><td>transformacja emitowanej wartości</td></tr>
              <tr><td><code>filter</code></td><td>pomijanie wartości niespełniających warunku</td></tr>
              <tr><td><code>switchMap</code></td><td>zamiana strumienia na inny (np. kolejne żądanie HTTP po kliknięciu)</td></tr>
              <tr><td><code>catchError</code></td><td>przechwycenie i obsługa błędu w strumieniu</td></tr>
              <tr><td><code>takeUntilDestroyed</code></td><td>automatyczne <code>unsubscribe()</code> przy niszczeniu komponentu (Angular 16+)</td></tr>
            </table>

            ### HttpClient

            ```typescript [|6|9-11|13-15|17-19|21-23]
            @Injectable({
              providedIn: 'root'
            })
            export class UserService {

              constructor(private readonly http: HttpClient) {
              }

              getAllUsers(): Observable<Array<User>> {
                return this.http.get<Array<User>>('services/rest/users');
              }

              findUser(id: number): Observable<User> {
                return this.http.get<User>(`services/rest/users/${id}`);
              }

              saveUser(user: User) {
                return this.http.post<User>('services/rest/users', user);
              }

              deleteUser(id: number): Observable<HttpResponse<any>> {
                return this.http.delete(`services/rest/users/${id}`, { observe: 'body' });
              }
            }
            ```
