            ## Projekt i implementacja systemów webowych

            Wykład 8.2: język TypeScript

            mgr inż. Maciej Małecki
            ---
            ## Wiemy już, że JavaScript to świetny język, ale...

            - brakuje w nim deklaracji typów
            - typy obiektowe są nieodróżnialne
            - brakuje klas przez co tworzenie wielu instancji podobnych obiektów jest utrudnione
            ---
            ## TypeScript

            - Język kompilowany do JavaScript stworzony i rozwijany przez Microsoft.
            - Język ten obecnie jest oficjalnym "poligonem doświadczalnym" dla JavaScriptu.
            - Duża część elementów TS przeszła do JS w ramach (ES2015).
            - Dzięki kompilacji można korzystać z rozszerzeń ECMA na przeglądarkach, które tej wersji JS jeszcze nie wspierają.
            ---
            [https://www.typescriptlang.org/play/index.html](https://www.typescriptlang.org/play/index.html)
            ---
            ### Deklaracja zmiennych i stałych

            ```typescript
            let price = 100.99;
            ```

            podobnie jak `var`, ale zasięg blokowy zamiast funkcyjnego

            ```typescript
            const multiplier = 3;
            ```

            podobnie jak `let`, lecz raz przypisanej wartości nie można zmienić
            ---
            ## Typy danych
            --
            ### Specyfikacja typów

            ```typescript
            const price: number = 99; // ok
            const price: number = 'foo'; // błąd kompilacji
            ```
            --
            ### Podstawowe typy

            - `boolean`
            - `number`
            - `string`
            - `number[]`, `string[]` - typ tablicowy
            - `Array<number>`, `Array<string>` - także typ tablicowy
            - `[string, number, number, boolean]` - krotka
            --
            ### Enumeracje

            ```typescript
            enum Color {Red, Green, Blue};
            let color: Color = Color.Green;
            console.log(Color[1]);       // -> "Green"
            console.log(Color["Green"]); // -> 1
            ```

            Typ enumeracyjny jest kompilowany do tablicy zawierającej mapowanie liczb na nazwy i na odwrót.

            ```typescript
            enum Color {Red, Green, Blue};
            console.log(Color); // -> {"0": "Red", "1": "Green", "2": "Blue", Red: 0, Green: 1, Blue: 2}
            ```
            --
            ### Bieda-enumeracje

            Typescript pozwala na deklarowania typów jako unii wartości

            ```typescript
            type Color = 'Red' | 'Green' | 'Blue';
            let color: Color;
            color = 'Red'; // ok
            color = 'foo'; // transpilation error
            ```
            --
            ### Type inference

            W wielu miejscach stosowanie specyfikatorów typów nie jest konieczne. TypeScript zawiera mechanizm *type inference*.

            ```typescript
            let price = 0; // wnioskowanie -> number
            price = 'foo'; // błąd kompilacji
            ```
            ---
            ### Fat arrow

            Funkcje można obecnie specyfikować zwięźlej stosująć notację "strzałkową" (*fat arrow*).

            ```typescript [data-line-numbers]
            const add = function(left, right) {
              return left + right;
            };
            const add2 = (left, right) => {
              return left + right;
            };
            // lub zwięźlej
            const add3 = (left, right) => left + right;
            ```

            Znacząco zwiększa to czytelność kodu funkcyjnego:

            ```typescript
            [1,2,3,4,5].map((value) => 2 * value);    // [2,4,6,8,10]
            [1,2,3,4,5].filter((value) => value < 4); // [1,2,3]
            ```

            Notacja fat arrow zmienia sposób wyliczania zmiennej `this`!
            ---
            ## Specyfikacja sygnatury funkcji

            Parametry oraz rezultat mogą być typizowane.<!-- .element class="more-text"-->

            ```typescript
            const add = function(left: number, right: number): number {
              return left + right;
            };
            const add2 = (left: number, right: number): number => {
              return left + right;
            };
            // lub zwięźlej
            const add3 = (left: number, right: number) => left + right;
            ```

            Zmienne typu funkcyjnego mogą być dokładnie wyspecyfikowane:<!-- .element class="fragment more-text"-->

            ```typescript
            type BinaryOp = (left: number, right: number) => number;

            const addFn: BinaryOp = (left, right) => left + right; // OK
            const badFn: BinaryOp = () => "Foo";                   // błąd kompilacji
            ```
            <!-- .element class="fragment"-->
            ---
            ## Interfejsy i typy obiektów

            ```typescript
            const totalPrice = (items: {price: number}[]) => {
              let sum = 0;
              items.forEach((item) => sum += item.price);
              return sum;
            };
            totalPrice([{price: 4.99, name: 'Bread'},
              {price: 12.99, name: 'Butter'}]); // -> 17.98
            totalPrice([{name: 'Apple'}, {name: 'Orange'}]); // -> błąd kompilacji
            ```

            Interfejs m.in. pozwala unikać redundantnych deklaracji:

            ```typescript
            interface Priceable {
              price: number; // pole obowiązkowe
              name?: string; // pole opcjonalne
            };
            const totalPrice = (items: Priceable[]) => ...
            ```
            --
            ### Interfejs jako kontrakt z backendem

            Interfejsy w TS świetnie nadają się do opisania kształtu DTO przesyłanych przez REST API.

            ```typescript
            export interface Course {
              id: number;
              title: string;
              lecturer: string;
              ects: number;
            }

            export interface CreateCourseRequest {
              title: string;
              lecturer: string;
              ects: number;
            }
            ```

            W praktyce produkcyjnej te typy generuje się automatycznie z OpenAPI — niedopasowanie kontraktu staje się błędem kompilacji, nie błędem runtime'u.<!-- .element class="fragment more-text"-->
            ---
            # Klasy
            --
            ## Klasy

            Brak klas w JavaScript jest uciążliwy. ECMAScript 6 i TypeScript wprowadzają pojęcie klasy.

            ```typescript
            class Product {
              constructor(public name: string, public price: number) {
              }
              getPriceTag() {
                return `${this.name} [${this.price}]`;
              }
            };
            ```

            Parametry konstruktora z modyfikatorem dostępu (`public`, `private`, `readonly`) są automatycznie promowane do pól klasy — *parameter properties*.<!-- .element class="more-text"-->
            --
            ## Modyfikatory dostępu

            Dostępne są następujące modyfikatory dostępu stosowane zarówno do metod jak i pól:

            - `public`
            - `protected`
            - `private`
            - (brak) - przyjmuje się dostęp jak w `public`

            ```typescript
            class Product {
              constructor(private name: string, private price: number) {
              }
              getPriceTag() {
                return `${this.name} [${this.price}]`;
              }
            };
            ```
            --
            ## Dziedziczenie

            ```typescript [1-9|11-19|21-27|29-32]
            class Animal {
              name: string;
              constructor(theName: string) {
                this.name = theName;
              }
              move(distanceInMeters: number = 0) {
                console.log(`${this.name} moved ${distanceInMeters}m.`);
              }
            }

            class Snake extends Animal {
              constructor(name: string) {
                super(name);
              }
              move(distanceInMeters = 5) {
                console.log("Slithering...");
                super.move(distanceInMeters);
              }
            }

            class Horse extends Animal {
              constructor(name: string) { super(name); }
              move(distanceInMeters = 45) {
                console.log("Galloping...");
                super.move(distanceInMeters);
              }
            }

            const sam = new Snake("Sammy the Python");
            const tom: Animal = new Horse("Tommy the Palomino");
            sam.move();
            tom.move(34);
            ```
            --
            ### Getters, Setters, Parameter properties

            ```typescript [1-12|14-16|18-20]
            class Osoba {
              constructor(private _name: string) {
              }

              get name(): string {
                  return this._name;
              }

              set name(value: string) {
                  this._name = value;
              }
            }

            const osoba = new Osoba('Jan');

            console.log(osoba.name); // Output: Jan

            osoba.name = 'Janek';

            console.log(osoba.name); // Output: Janek
            ```
            --
            ### Read-only parameter properties

            ```typescript
            class Osoba {
              constructor(private readonly name: string) {
              }
            }

            const osoba = new Osoba('Jan');

            console.log(osoba.name); // Output: Jan

            osoba.name = 'Janek'; // Error: Cannot assign to 'name'
                                  // because it is a read-only property.
            ```
            --
            ### W praktyce klasy wykorzystywane są rzadko

            ```typescript [data-line-numbers]
            interface Person {
              name: string;
              surname: string;
              age: number;
            }

            const johnDoe: Person = {
              name: 'John',
              surname: 'Doe',
              age: 44
            };
            ```
            ---
            # Typy zaawansowane
            --
            ### Unie typów (*union*)

            ```typescript [data-line-numbers]
            let x: 'foo' | 'bar';
            x = 'foo';
            x = 'some other value'; // <-- błąd kompilacji

            let y: string | number;
            y = 'foo';
            y = 123;
            y = true; // <-- błąd kompilacji
            ```
            --
            ### Przecięcia typów (*intersection*)

            ```typescript [data-line-numbers]
            interface Person {
              name: string;
              age: number;
            }
            interface Employee {
              employeeNumber: string;
            }

            const johnDoe: Person & Employee = {
              name: 'John Doe',
              age: 44,
              employeeNumber: '123-234-456'
            };
            ```
            --
            ### Duck typing

            > Skoro wygląda jak kaczka i kwacze jak kaczka, to jest kaczką

            ```typescript [1-3|5-7|9-14|16-20]
            class Pigeon {
              sound = "coos";
            }

            class Owl {
              sound = "hoots";
            }

            class Penguin {
              sound = "peeps";
              swim() {
                console.log("I'm a bird and i can swim");
              }
            }

            let pigeon: Pigeon = new Owl();      // Works
            let owl: Owl = new Pigeon();         // Works
            let pigeon2: Pigeon = new Penguin(); // Works
            let penguin: Penguin = new Pigeon(); // Compile time error
            ```
            --
            ### Typ Record

            Typ narzędziowy `Record<K,V>`, który tworzy typ o odpowiednich typach kluczy i wartości.

            ```typescript
            // Define a record with string keys and number values
            type NumberByString = Record<string, number>;

            const scores: NumberByString = {
              "Alice": 95,
              "Bob": 87,
              "Carol": 92
            };
            ```
            --
            ### Duck typing - pułapki

            ```typescript [1-3|4|6-9|11-16|18|20]
            export type Data = {
              values?: number[];
            };
            export type DataByString = Record<string, Data>;

            export const consume = (data: Data): string => {
                if (data.values) return JSON.stringify(data.values);
                else return 'no values';
            };

            const dataByString: DataByString = {
                a: { values: [1, 2, 3] },
                b: { values: [4, 5, 6] },
            };

            const data: Data = { values: [1, 2, 3] };

            consume(data); // compiles

            consume(dataByString); // compiles!!!
            ```
            --
            ### Index signature

            Bardziej zwięzła i uproszczona forma deklaracji `Record`

            ```typescript
            // Define a record with string keys and number values
            type NumberByString = {
              [key: string]: number;
            };

            const scores: NumberByString = {
              "Alice": 95,
              "Bob": 87,
              "Carol": 92
            };
            ```
            ---
            # Generyczność (*generics*)
            --
            ### Funkcje generyczne

            Generyki pozwalają pisać kod, który działa dla wielu typów, **bez** rezygnacji z typowania.

            ```typescript
            function identity<T>(value: T): T {
              return value;
            }

            const a = identity<number>(42);  // T = number
            const b = identity('foo');       // T inferred = 'foo'
            ```

            Bez generyków musielibyśmy użyć `any` — i stracić informację o typie zwracanym.<!-- .element class="more-text"-->
            --
            ### Generyczne struktury danych

            ```typescript [data-line-numbers]
            interface ApiResponse<T> {
              data: T;
              timestamp: string;
              error?: string;
            }

            const courseResponse: ApiResponse<Course> = {
              data: { id: 1, title: 'PIiSW', lecturer: 'Małecki', ects: 4 },
              timestamp: '2026-04-26T12:00:00Z',
            };

            const listResponse: ApiResponse<Course[]> = {
              data: [/* ... */],
              timestamp: '2026-04-26T12:00:00Z',
            };
            ```
            --
            ### Ograniczenia generyków (*constraints*)

            ```typescript
            interface HasId { id: number; }

            function findById<T extends HasId>(items: T[], id: number): T | undefined {
              return items.find((item) => item.id === id);
            }

            findById([{ id: 1, title: 'PIiSW' }], 1);  // OK
            findById([{ name: 'foo' }], 1);            // błąd: brak 'id'
            ```

            `T extends HasId` mówi: "T może być dowolnym typem, **pod warunkiem** że ma pole `id: number`".
            ---
            # Typy narzędziowe (*utility types*)
            --
            ### `Partial<T>` i `Required<T>`

            ```typescript
            interface Course {
              id: number;
              title: string;
              lecturer: string;
              ects: number;
            }

            // wszystkie pola opcjonalne — przydatne dla PATCH-y
            type CourseUpdate = Partial<Course>;

            const patch: CourseUpdate = { ects: 5 }; // OK

            // odwrotność: wymusza wszystkie pola
            type StrictCourse = Required<CourseUpdate>;
            ```
            --
            ### `Pick<T, K>` i `Omit<T, K>`

            ```typescript
            interface Course {
              id: number;
              title: string;
              lecturer: string;
              ects: number;
            }

            // tylko wybrane pola
            type CourseSummary = Pick<Course, 'id' | 'title'>;
            // { id: number; title: string }

            // wszystko poza wybranymi polami
            type CreateCourseRequest = Omit<Course, 'id'>;
            // { title: string; lecturer: string; ects: number }
            ```

            Idiomatyczny sposób tworzenia DTO bez powielania definicji pól.<!-- .element class="fragment more-text"-->
            --
            ### `Readonly<T>` i tablice tylko-do-odczytu

            ```typescript
            const course: Readonly<Course> = {
              id: 1, title: 'PIiSW', lecturer: 'Małecki', ects: 4
            };
            course.title = 'foo'; // błąd kompilacji

            const ids: ReadonlyArray<number> = [1, 2, 3];
            ids.push(4); // błąd: 'push' nie istnieje w ReadonlyArray
            ```
            --
            ### `ReturnType<T>` i `Parameters<T>`

            Wyciąganie typów z istniejących sygnatur funkcji.

            ```typescript
            function loadCourse(id: number): Course {
              return { id, title: 'PIiSW', lecturer: 'Małecki', ects: 4 };
            }

            type LoadResult = ReturnType<typeof loadCourse>; // Course
            type LoadArgs = Parameters<typeof loadCourse>;   // [number]
            ```

            `Awaited<T>` rozpakowuje typ z `Promise`:

            ```typescript
            async function fetchCourse(): Promise<Course> { /* ... */ }
            type FetchResult = Awaited<ReturnType<typeof fetchCourse>>; // Course
            ```
            ---
            # Bezpieczna obsługa wartości
            --
            ### `unknown` zamiast `any`

            `any` wyłącza system typów. `unknown` mówi "nie wiem co to" — i zmusza do **zawężenia typu** przed użyciem.

            ```typescript
            function handle(value: any) {
              value.foo.bar; // OK dla kompilatora, runtime error
            }

            function handleSafely(value: unknown) {
              value.foo.bar;          // błąd kompilacji
              if (typeof value === 'string') {
                console.log(value.length); // OK — zawężone do string
              }
            }
            ```

            **Zasada:** używaj `unknown` na granicach systemu (parsowanie JSON, `fetch`), `any` tylko jako ostatnia deska ratunku.<!-- .element class="more-text"-->
            --
            ### Optional chaining `?.`

            ```typescript
            interface User {
              name: string;
              address?: { city?: string };
            }

            const user: User = { name: 'Jan' };

            // bez ?.
            const city = user.address && user.address.city;

            // z ?.
            const city2 = user.address?.city; // undefined, bez błędu

            // działa też dla wywołań i indeksowania
            user.address?.city?.toUpperCase();
            arr?.[0];
            callback?.(arg);
            ```
            --
            ### Nullish coalescing `??`

            Operator `??` zwraca prawą stronę **tylko** gdy lewa to `null` lub `undefined` — w odróżnieniu od `||`, który łapie też `0`, `''`, `false`.

            ```typescript
            const port = config.port ?? 8080;

            // pułapka klasycznego ||
            const a = 0 || 100;   // 100  ❌ — '0' to nie błąd
            const b = 0 ?? 100;   // 0    ✅

            // przypisanie z fallbackiem
            options.timeout ??= 5000; // ustaw tylko jeśli null/undefined
            ```
            ---
            # `satisfies` — TypeScript 4.9
            --
            ### Problem: adnotacja typu *psuje* inferencję

            ```typescript
            type Config = Record<string, string | number>;

            const config: Config = {
              port: 8080,
              host: 'localhost',
            };

            config.port.toFixed(2); // błąd: port może być string!
            ```

            Adnotacja `: Config` **walidowała** kształt, ale jednocześnie **rozszerzyła** typy pól do `string | number`.<!-- .element class="more-text"-->
            --
            ### Rozwiązanie: `satisfies`

            ```typescript
            const config = {
              port: 8080,
              host: 'localhost',
            } satisfies Config;

            config.port.toFixed(2); // OK — TS wie, że to number
            config.host.toUpperCase(); // OK — TS wie, że to string
            ```

            **`satisfies` waliduje, że wartość pasuje do typu, ale zachowuje precyzyjny typ wyrażenia.**<!-- .element class="more-text"-->

            Idealne dla obiektów konfiguracyjnych, route'ów, mapowań — wszędzie tam, gdzie chcesz obu rzeczy naraz.<!-- .element class="more-text"-->
            --
            ### `as const` — literały zamiast szerokich typów

            ```typescript
            const role1 = 'admin';              // typ: string
            const role2 = 'admin' as const;     // typ: 'admin'

            const roles = ['admin', 'user'];                    // string[]
            const roles2 = ['admin', 'user'] as const;          // readonly ['admin', 'user']

            // praktyczne zastosowanie:
            const HTTP_METHODS = ['GET', 'POST', 'PUT', 'DELETE'] as const;
            type HttpMethod = typeof HTTP_METHODS[number];
            // 'GET' | 'POST' | 'PUT' | 'DELETE'
            ```
            ---
            # Template literal types
            --
            ### Typy z szablonów stringów

            TypeScript potrafi typować *kształt* stringów — analogicznie do template literals w runtime.

            ```typescript
            type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE';
            type ApiPath = `/api/${string}`;
            type Endpoint = `${HttpMethod} ${ApiPath}`;

            const e1: Endpoint = 'GET /api/courses';   // OK
            const e2: Endpoint = 'PATCH /api/courses'; // błąd: PATCH nie pasuje
            const e3: Endpoint = 'GET /courses';       // błąd: brak /api/
            ```

            Stosowane m.in. w typowaniu route'ów, kluczy CSS, zdarzeń DOM (`on${EventName}`).<!-- .element class="more-text"-->
            ---
            ## Destrukturyzacja
            --
            ### Destrukturyzacja obiektu

            ```typescript
            const person = {
              name: 'John',
              age: 30,
            };

            const { name, age } = person;
            console.log(name); // John
            console.log(age);  // 30
            ```
            --
            ### Destrukturyzacja tablicy

            ```typescript
            const numbers = [1, 2, 3, 4, 5];

            const [first, second] = numbers;
            console.log(first); // 1
            console.log(second); // 2

            const [, second, ...rest] = numbers;
            console.log(second); // 2
            console.log(rest);   // [3, 4, 5]
            ```
            --
            ### Spread operator

            ```typescript
            const numbers = [1, 2, 3];
            const newNumbers = [...numbers, 4, 5];
            console.log(newNumbers); // [1, 2, 3, 4, 5]

            const person = { name: 'John', age: 30 };
            const newPerson = { ...person, city: 'New York' };
            console.log(newPerson); // { name: 'John', age: 30, city: 'New York' }
            ```
            ---
            ## Type guards
            ## Smart casting
            --
            ### Discriminated unions

            Unia typów + wspólne pole-dyskryminator (`kind`) pozwala TS-owi automatycznie zawęzić typ w gałęzi `if`/`switch`.

            ```typescript [1-12|13-20]
            type Shape =
              | { kind: 'circle'; radius: number }
              | { kind: 'rectangle'; width: number; height: number };

            function area(shape: Shape): number {
              if (shape.kind === 'circle') {
                return Math.PI * shape.radius ** 2;
              } else {
                return shape.width * shape.height;
              }
            }

            const circle: Shape = { kind: 'circle', radius: 5 };
            const rectangle: Shape = { kind: 'rectangle', width: 10, height: 20 };

            console.log(area(circle)); // 78.53981633974483
            console.log(area(rectangle)); // 200
            ```
            --
            ### Zawężanie operatorem `in`

            Gdy nie ma dyskryminatora, można sprawdzić obecność pola.

            ```typescript
            type Dog = { bark: () => void };
            type Cat = { meow: () => void };

            function speak(animal: Dog | Cat) {
              if ('bark' in animal) {
                animal.bark(); // zawężone do Dog
              } else {
                animal.meow(); // zawężone do Cat
              }
            }
            ```
            --
            ### Wyczerpujące sprawdzanie (*exhaustiveness*)

            Trick z `never` — kompilator wymusza obsłużenie wszystkich wariantów unii.<!-- .element class="most-text"-->

            ```typescript
            type Shape =
              | { kind: 'circle'; radius: number }
              | { kind: 'rectangle'; width: number; height: number }
              | { kind: 'triangle'; base: number; height: number };
            function area(shape: Shape): number {
              switch (shape.kind) {
                case 'circle':    return Math.PI * shape.radius ** 2;
                case 'rectangle': return shape.width * shape.height;
                // brak case 'triangle' →
                default:
                  const _exhaustive: never = shape; // błąd kompilacji!
                  return _exhaustive;
              }
            }
            ```

            Dodanie nowego wariantu do unii **automatycznie** wskaże miejsca w kodzie, które trzeba zaktualizować.<!-- .element class="most-text"-->
            --
            ### Type guards

            ```typescript
            type Dog = { bark: () => void };
            type Cat = { meow: () => void };

            function isDog(animal: Dog | Cat): animal is Dog {
              return (animal as Dog).bark !== undefined;
            }

            const animal: Dog | Cat = { bark: () => console.log("Woof!") };

            if (isDog(animal)) {
              animal.bark(); // OK
            } else {
              animal.meow(); // Error
            }
            ```
            ---
            ## Moduły i `import type`
            --
            ### Type-only imports

            Importy *tylko typów* są usuwane podczas kompilacji — nie powodują żadnego efektu w runtime.

            ```typescript
            import type { Course } from './models';
            import { CourseApi } from './course-api';

            // alternatywnie, mieszane:
            import { CourseApi, type Course } from './course-api';
            ```

            **Po co?** Eliminacja cyklicznych zależności runtime, mniejsze bundle, jasna intencja.<!-- .element class="more-text"-->
            ---
            ## TypeScript w naszym stosie

            - **Backend (Spring Boot)** wystawia REST API → opis w **OpenAPI**.
            - Generator (`openapi-generator`) tworzy z OpenAPI **typy TS i serwisy Angulara**.
            - Każda zmiana DTO po stronie backendu = błąd kompilacji TS przed deployem.
            - `interface`, `Pick`, `Omit`, `Partial` — buduj typy frontu z DTO, nie powielaj ręcznie.
            - `unknown` na granicach (`fetch`, `JSON.parse`), nigdy `any`.
            - `satisfies` dla konfiguracji, `as const` dla list dozwolonych wartości.

            > Typy są kontraktem. Im silniejszy kontrakt, tym mniej bugów na styku warstw.
